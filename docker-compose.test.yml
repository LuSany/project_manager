version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: project_manager_test
    restart: always
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tests/fixtures:/app/tests/fixtures
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test -d test_db']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
